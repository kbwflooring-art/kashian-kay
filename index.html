function calcRugPrice(mid){
  var container=document.getElementById('bk-rug-rows-'+mid);
  var totalSqft=0;var rugDesc=[];
  function roundFt(ft,inches){return (parseInt(ft)||0)+((parseInt(inches)||0)>=6?1:0);}
  if(container){
    var rows=container.querySelectorAll('.bk-rug-size-row');
    rows.forEach(function(row,i){
      var count=i+1;
      var wftEl=document.getElementById('bk-rug-wft'+count+'-'+mid);
      var winEl=document.getElementById('bk-rug-win'+count+'-'+mid);
      var hftEl=document.getElementById('bk-rug-hft'+count+'-'+mid);
      var hinEl=document.getElementById('bk-rug-hin'+count+'-'+mid);
      if(wftEl&&hftEl){
        var w=roundFt(wftEl.value,winEl?winEl.value:0);
        var h=roundFt(hftEl.value,hinEl?hinEl.value:0);
        if(w>0&&h>0){
          totalSqft+=w*h;
          var wOrig=(parseInt(wftEl.value)||0)+(winEl&&parseInt(winEl.value)>0?"'"+winEl.value+'"':'ft');
          var hOrig=(parseInt(hftEl.value)||0)+(hinEl&&parseInt(hinEl.value)>0?"'"+hinEl.value+'"':'ft');
          rugDesc.push(wOrig+' x '+hOrig+' (billed as '+w+'x'+h+')');
        }
      }
    });
  }
  var detEl=document.getElementById('bk-detail-'+mid);
  if(detEl)detEl.value=rugDesc.join(', ');
  var priceRow=document.getElementById('bk-price-row-'+mid);
  var priceEl=document.getElementById('bk-price-'+mid);
  if(!priceRow)return;
  if(totalSqft===0){priceRow.style.display='none';return;}
  var basePrice=Math.max(199,totalSqft*4.00);
  var protectEl=document.getElementById('bk-protect-'+mid);
  var enzymeEl=document.getElementById('bk-enzyme-'+mid);
  var protect=(protectEl&&protectEl.checked)?totalSqft*2:0;
  var enzyme=(enzymeEl&&enzymeEl.checked)?totalSqft*2:0;
  var total=basePrice+protect+enzyme;
  var breakdown='Rug Cleaning: $'+basePrice.toFixed(2);
  if(protect>0)breakdown+='<br>Fiber Protectant: $'+protect.toFixed(2);
  if(enzyme>0)breakdown+='<br>Enzyme Treatment: $'+enzyme.toFixed(2);
  breakdown+='<br><strong>Total: $'+total.toFixed(2)+'</strong>';
  breakdown+='<br><small style="color:#166534">$199 minimum applies.</small>';
  priceEl.innerHTML=breakdown;
  priceRow.style.display='block';
}

  var priceEl=document.getElementById('bk-price-'+mid);
  if(priceEl&&priceEl.textContent)priceInfo+=' '+priceEl.textContent.replace(/<[^>]*>/g,' ').trim();
  if(!name||!phone||!email||!addr||!appt){alert('Please fill in all required fields.');return;}
  if(!selfP&&(!cname||!cphone)){alert('Please provide the on-site contact, or check that you will be there yourself.');return;}
  var isChicago=/\bchicago\b/i.test(addr);
  var truck=svc==='CARPET'?'Truck 1 or Truck 2':svc==='UPHOLSTERY'?'Truck 1 preferred':'Rug Pickup Calendar - Tues and Thurs only';
  var eb='NEW BOOKING - KASHIAN BROS KAY\nSERVICE: '+lbl+'\nCALENDAR: '+truck+'\n'+(isChicago?'*** CHICAGO - Adolfo must book manually ***\n':'')+'\nName: '+name+'\nPhone: '+phone+'\nEmail: '+email+'\nAddress: '+addr+'\n'+(detail?'Details: '+detail+'\n':'')+(priceInfo?'Price/Duration: '+priceInfo+'\n':'')+'\nAppointment: '+appt+'\nOn-site: '+(selfP?'Customer present':'Contact: '+cname+' '+cphone)+(notes?'\nNotes: '+notes:'')+'\nSubmitted: '+new Date().toLocaleString();
  fetch('/.netlify/functions/booking',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,phone:phone,email:email,addr:addr,svc:svc,lbl:lbl,detail:detail,stairs:'',date:appt,time:'',selfP:selfP,cname:cname,cphone:cphone,pets:'',notes:notes+(priceInfo?'\nPrice/Duration: '+priceInfo:''),isChicago:isChicago,truck:truck,emailBody:eb})}).catch(function(){});
  var timing=getConfirmTiming();
  var f=document.getElementById('bkf-'+mid);
  f.className='bk-success';
  f.innerHTML='<h3>Booking Request Sent!</h3><p style="margin-top:8px"><strong>Thank you, '+fname+'!</strong></p><p style="margin-top:6px">Your booking request for <strong>'+lbl+'</strong> has been sent.</p><p style="margin-top:8px;background:#dcfce7;border-radius:6px;padding:8px"><strong>'+timing+'</strong></p><p style="margin-top:8px">Confirmation will go to <strong>'+email+'</strong>. Questions? Call <strong>(847) 251-1200</strong>.</p>'+(isChicago?'<p style="margin-top:8px;background:#fef9c3;border-radius:6px;padding:8px">Chicago bookings are handled personally by our cleaning manager.</p>':'');
  hist.push({role:'user',content:'BOOKING SUBMITTED: '+name+' for '+lbl+' on '+appt});
  hist.push({role:'assistant',content:'Booking sent! '+timing});
  flow.scope=null;
}
function addMsg(role,content,id){
  var msgs=document.getElementById('msgs'),isBot=role==='assistant';
  var fm=content.match(/\[SHOW_BOOKING_FORM:(CARPET|UPHOLSTERY|RUG_PICKUP)([^\]]*)\]/);
  var sc=content.match(/\[SHOW_SCOPE_FORM\]/);
  var cc=content.replace(/\[SHOW_BOOKING_FORM:(CARPET|UPHOLSTERY|RUG_PICKUP)[^\]]*\]/g,'').replace(/\[SHOW_SCOPE_FORM\]/g,'').trim();
  var row=document.createElement('div');row.className='row '+(isBot?'b':'u');row.id='r'+id;
  var ic=document.createElement('div');ic.className='ic '+(isBot?'b':'u');ic.innerHTML=isBot?'&#x1F9F9;':'&#x1F464;';
  var wrap=document.createElement('div');wrap.style.maxWidth='100%';
  var bub=document.createElement('div');bub.className='bub '+(isBot?'b':'u');
  bub.innerHTML=isBot?nl2html(cc):'<p>'+content+'</p>';
  wrap.appendChild(bub);
  if(sc&&isBot){wrap.appendChild(buildScopeForm(id));}
  if(fm&&isBot){var pArr=(fm[2]||'').replace(/^\|/,'').split('|');wrap.appendChild(buildBookingForm(fm[1],id,pArr[0]||'',pArr[1]||'',pArr[2]||'',pArr[3]||'',pArr[4]||'',pArr[5]||'',pArr[6]||''));}
  if(isBot&&id>0){
    var fbr=document.createElement('div');fbr.className='fbr';
    var bg=document.createElement('button');bg.className='fb good';bg.textContent='Good';bg.onclick=function(){thumb(id,'good',content);};fbr.appendChild(bg);
    var bb=document.createElement('button');bb.className='fb bad';bb.textContent='Fix';bb.onclick=function(){thumb(id,'bad',content);};fbr.appendChild(bb);
    var bn=document.createElement('button');bn.className='fb note';bn.id='fbn'+id;bn.textContent='Add note';bn.onclick=function(){toggleNote(id,content);};fbr.appendChild(bn);
    wrap.appendChild(fbr);
    var nb=document.createElement('div');nb.className='nb';nb.id='nb'+id;nb.style.display='none';
    var nl2=document.createElement('div');nl2.style.cssText='font-size:12px;color:#92400e;margin-bottom:6px;font-weight:500';nl2.textContent='Add a note:';
    var nt=document.createElement('textarea');nt.id='nt'+id;nt.rows=3;nt.placeholder='Type correction or note...';
    nt.onkeydown=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitNote(id,content);}};
    var na=document.createElement('div');na.className='na';
    var ns=document.createElement('button');ns.className='ns';ns.textContent='Submit';ns.onclick=function(){submitNote(id,content);};
    var nc2=document.createElement('button');nc2.className='nc';nc2.textContent='Cancel';nc2.onclick=function(){document.getElementById('nb'+id).style.display='none';};
    var nh=document.createElement('span');nh.style.cssText='font-size:11px;color:#94a3b8';nh.textContent='or press Enter';
    na.appendChild(ns);na.appendChild(nc2);na.appendChild(nh);
    nb.appendChild(nl2);nb.appendChild(nt);nb.appendChild(na);
    wrap.appendChild(nb);
  }
  row.appendChild(ic);row.appendChild(wrap);msgs.appendChild(row);
  msgs.scrollTop=msgs.scrollHeight;cnt++;
  document.getElementById('mc').textContent=cnt+' messages';
  setTimeout(function(){setupAllAddressFields();},200);
}
function addTyping(){var msgs=document.getElementById('msgs');var d=document.createElement('div');d.className='row b';d.id='typing';var ic=document.createElement('div');ic.className='ic b';ic.innerHTML='&#x1F9F9;';var td=document.createElement('div');td.className='td';[0,.2,.4].forEach(function(s){var dot=document.createElement('div');dot.style.animationDelay=s+'s';td.appendChild(dot);});d.appendChild(ic);d.appendChild(td);msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}
function thumb(id,type,content){var btn=document.querySelector('#r'+id+' .fb.'+type);if(!btn)return;var on=btn.classList.contains('on');document.querySelectorAll('#r'+id+' .fb.good, #r'+id+' .fb.bad').forEach(function(b){b.classList.remove('on');});if(!on){btn.classList.add('on');if(type==='bad'){document.getElementById('nb'+id).style.display='block';setTimeout(function(){document.getElementById('nt'+id).focus();},50);}addFb({type:type,msgId:id,q:getLastQ(),a:content.substring(0,120),note:'',});}}
function toggleNote(id,content){var box=document.getElementById('nb'+id);box.style.display=box.style.display!=='none'?'none':'block';if(box.style.display!=='none')setTimeout(function(){document.getElementById('nt'+id).focus();},50);}
function submitNote(id,content){var txt=document.getElementById('nt'+id).value.trim();if(!txt)return;addFb({type:'note',msgId:id,q:getLastQ(),a:content.substring(0,120),note:txt});document.getElementById('nb'+id).style.display='none';document.getElementById('nt'+id).value='';var btn=document.getElementById('fbn'+id);btn.textContent='Note added';btn.classList.add('on');}
function getLastQ(){var f=hist.slice().reverse().find(function(m){return m.role==='user';});return f?f.content.substring(0,80):'';}
function addFb(entry){entry.tester=document.getElementById('tn').value||'Anonymous';entry.time=new Date().toLocaleTimeString();fbLog=fbLog.filter(function(f){return!(f.msgId===entry.msgId&&f.type===entry.type);});fbLog.push(entry);renderFb();}
function renderFb(){var list=document.getElementById('fl');document.getElementById('fc').textContent=fbLog.length;if(!fbLog.length){list.innerHTML='No feedback yet.<br><br>Good = correct<br>Fix = wrong<br>Note = add comment';return;}var colors={good:'#16a34a',bad:'#dc2626',note:'#ca8a04'};var labels={good:'Correct',bad:'Needs fix',note:'Note'};list.innerHTML='';fbLog.slice().reverse().forEach(function(f){var d=document.createElement('div');d.style.cssText='background:#fff;border:1px solid #b8eeeb;border-left:3px solid '+colors[f.type]+';border-radius:8px;padding:9px;font-size:11.5px;color:#111';d.innerHTML='<div style="font-size:10px;color:#94a3b8;margin-bottom:3px;display:flex;justify-content:space-between"><span style="font-weight:600;color:'+colors[f.type]+'">'+labels[f.type]+'</span><span>'+f.tester+'</span></div>'+(f.q?'<div style="color:#333;font-style:italic;font-size:11px;margin-bottom:3px">'+f.q+'</div>':'')+'<div style="color:#111">'+(f.note||f.a+'...')+'</div>';list.appendChild(d);});}
function exportFb(){if(!fbLog.length){alert('No feedback yet.');return;}var t=document.getElementById('tn').value||'Anonymous';var txt='KASHIAN BROS KAY FEEDBACK\nExported: '+new Date().toLocaleString()+'\nTester: '+t+'\nTotal: '+fbLog.length+'\n\n';fbLog.forEach(function(f,i){var lbl={good:'CORRECT',bad:'NEEDS FIX',note:'NOTE'}[f.type];txt+='['+(i+1)+'] '+lbl+' - '+f.tester+' at '+f.time+'\n';if(f.q)txt+='Asked: "'+f.q+'"\n';txt+=f.note?'Correction: '+f.note+'\n':'Response: '+f.a+'...\n';txt+='\n';});var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));a.download='KashianBros_Kay_Feedback_'+new Date().toISOString().slice(0,10)+'.txt';a.click();}
var flow={active:false,type:null,step:null,service:null,rugCount:null,detail:null,duration:0,address:null,awaitingText:false,scope:null};
function flowMsg(text,buttons){var msg=text;if(buttons&&buttons.length)msg+='\n[BUTTONS:'+buttons.join('|')+']';hist.push({role:'assistant',content:text});addMsg('assistant',msg,cnt);}
function handleInput(text,btn){
  if(btn){var par=btn.parentNode;if(par){var sibs=par.querySelectorAll('.inline-btn');for(var i=0;i<sibs.length;i++){sibs[i].disabled=true;sibs[i].style.opacity='0.4';}}}
  if(text==='Schedule a Pickup'){addMsg('user',text,cnt);hist.push({role:'user',content:text});startRugFlow();return;}
  if(flow.active)handleFlowButton(text);
  else send(text);
}
function disableBubbles(wrap){var btns=wrap.querySelectorAll('.inline-btn');for(var i=0;i<btns.length;i++){btns[i].disabled=true;btns[i].style.opacity='0.4';}}
function startCarpetFlow(){
  document.getElementById('qw').style.display='none';
  flow={active:true,type:'carpet_upholstery',step:'scope',service:null,rugCount:null,detail:null,duration:0,address:null,awaitingText:false,scope:null};
  addMsg('user','Schedule Carpet & Upholstery Cleaning',cnt);
  hist.push({role:'user',content:'Schedule Carpet & Upholstery Cleaning'});
  flowMsg('Happy to help! Tell me what needs cleaning so I can find a time that fits your job.\n[SHOW_SCOPE_FORM]');
}
function startRugFlow(){
  document.getElementById('qw').style.display='none';
  flow={active:true,type:'rug',step:'show_slots',service:'rug',rugCount:null,detail:null,duration:45,address:null,awaitingText:false,scope:null};
  addMsg('user','Schedule Rug Pickup',cnt);
  hist.push({role:'user',content:'Schedule Rug Pickup'});
  flowMsg('Let me check our pickup schedule...');
  checkAvailabilityForFlow();
}
function handleFlowButton(text){
  if(flow.step==='time_choice'){
    if(text==='I have a different time in mind'){
      addMsg('user',text,cnt);hist.push({role:'user',content:text});
      flow.step='custom_time';flow.awaitingText=true;
      flowMsg('What date and time works for you? For example: Monday May 5 at 10:00 AM');
    } else {
      addMsg('user',text,cnt);hist.push({role:'user',content:text});
      var parts=text.split(' at ');var dateStr=parts[0]||'';var timeStr=parts[1]||'';
      showBookingFormFromFlow(dateStr,timeStr);
    }
  }
}
function showBookingFormFromFlow(dateStr,timeStr){
  var svc=flow.type==='rug'?'RUG_PICKUP':flow.service==='upholstery'?'UPHOLSTERY':'CARPET';
  var fakeReply='Great! Please fill in your details below and we will get you all set! [SHOW_BOOKING_FORM:'+svc+'|||||'+(flow.detail||'')+'|'+dateStr+'|'+timeStr+']';
  hist.push({role:'assistant',content:'Great! Please fill in your details below and we will get you all set!'});
  addMsg('assistant',fakeReply,cnt);flow.active=false;
}
function handleFlowText(text){
  if(flow.step==='custom_time'){
    addMsg('user',text,cnt);hist.push({role:'user',content:text});
    flow.awaitingText=false;
    flowMsg('Let me check if that time is available...');
    checkCustomTime(text);
  }
}
async function checkCustomTime(requestedTime){
  var type=flow.type==='rug'?'RUG':'CARPET';
  try{
    var r=await fetch('/.netlify/functions/availability?duration='+flow.duration+'&type='+type);
    var d=await r.json();
    if(d.slots&&d.slots.length){
      var btns=d.slots.slice(0,4).map(function(s){return s.label;});
      btns.push('I have a different time in mind');
      flowMsg('Sorry, that time is not available. Here are our next open slots:',btns);
      flow.step='time_choice';
    } else {
      flowMsg('Our schedule is quite full right now. Please call us at (847) 251-1200 and we will find you a time!');
      flow.active=false;
    }
  }catch(e){flowMsg('I had trouble checking the schedule. Please call (847) 251-1200!');flow.active=false;}
}
async function checkAvailabilityForFlow(){
  var type=flow.type==='rug'?'RUG':'CARPET';
  try{
    var r=await fetch('/.netlify/functions/availability?duration='+flow.duration+'&type='+type);
    if(!r.ok)throw new Error('HTTP '+r.status);
    var d=await r.json();
    if(d.slots&&d.slots.length){
      flow.step='time_choice';
      var btns=d.slots.slice(0,4).map(function(s){return s.label;});
      btns.push('I have a different time in mind');
      var msg=flow.type==='rug'?'Here are our next available pickup times. Which works best?':'Here are our next available times that fit your '+fmtDuration(flow.duration)+' job. Which works best?';
      flowMsg(msg,btns);
    } else {
      flowMsg('Our schedule is quite full for a '+fmtDuration(flow.duration)+' job in the next two weeks. Please call us at (847) 251-1200 and we will find you a time!');
      flow.active=false;
    }
  }catch(e){flowMsg('Connection error: '+e.message+'. Please call (847) 251-1200!');flow.active=false;}
}
function showMainButtons(){
  var msgs=document.getElementById('msgs');
  var lastRow=msgs.lastElementChild;
  if(!lastRow)return;
  var bub=lastRow.querySelector('.bub');
  if(!bub)return;
  var wrap=document.createElement('div');
  wrap.style.cssText='display:flex;flex-wrap:wrap;gap:7px;margin-top:12px';
  var bubbles=[
    {label:'Schedule Carpet & Upholstery Cleaning',fn:function(){disableBubbles(wrap);startCarpetFlow();}},
    {label:'Schedule Rug Pickup',fn:function(){disableBubbles(wrap);startRugFlow();}},
    {label:'Rug Cleaning Prices',fn:function(){disableBubbles(wrap);send('I would like to know about rug cleaning prices');}},
    {label:'My dog had an accident on my rug',fn:function(){disableBubbles(wrap);send('My dog had an accident on my rug');}},
    {label:'I spilled red wine - what do I do?',fn:function(){disableBubbles(wrap);send('I spilled red wine - what do I do?');}},
    {label:'How much is a rug pad?',fn:function(){disableBubbles(wrap);send('How much is a rug pad?');}},
    {label:'Tell me about wood floor refinishing',fn:function(){disableBubbles(wrap);send('Tell me about wood floor refinishing');}},
    {label:'Kitchen & Bathroom Remodeling',fn:function(){disableBubbles(wrap);send('Tell me about your kitchen and bathroom remodeling services');}},
    {label:'Carpet & Area Rugs',fn:function(){disableBubbles(wrap);send('Tell me about your carpet and area rug sales');}},
    {label:'Ask a Question',fn:function(){disableBubbles(wrap);send('I have a question');}}
  ];
  bubbles.forEach(function(b){
    var btn=document.createElement('button');
    btn.className='inline-btn';
    btn.textContent=b.label;
    btn.onclick=b.fn;
    wrap.appendChild(btn);
  });
  bub.appendChild(wrap);
  document.getElementById('qw').style.display='none';
}
function send(text){
  if(!text||!text.trim())return;
  if(flow.active&&flow.awaitingText){flow.awaitingText=false;handleFlowText(text.trim());document.getElementById('inp').value='';return;}
  document.getElementById('qw').style.display='none';
  document.getElementById('inp').value='';
  document.getElementById('sb').disabled=true;
  var id=cnt;
  addMsg('user',text,id);
  hist.push({role:'user',content:text});
  addTyping();
  fetch('/.netlify/functions/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,system:SP+(availCache?'\n\n'+availCache:''),messages:hist})}).then(function(r){return r.json();}).then(function(data){
    var reply=data.content&&data.content[0]?data.content[0].text:'I had trouble with that. Please call (847) 251-1200!';
    var t=document.getElementById('typing');if(t)t.remove();
    hist.push({role:'assistant',content:reply});
    addMsg('assistant',reply,cnt);
  }).catch(function(){
    var t=document.getElementById('typing');if(t)t.remove();
    addMsg('assistant','I am having trouble connecting. Please call (847) 251-1200 or email info@kashianbros.com!',cnt);
  }).finally(function(){document.getElementById('sb').disabled=false;});
}
addMsg('assistant','Hi! I am Kay from Kashian Bros. How can I help you today?',0);
showMainButtons();
</script>
