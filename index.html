function calcJobDuration(mid){
  var totalMin=0;
  Object.keys(CARPET_ROOMS).forEach(function(k){var qty=getQty(k+'-'+mid);if(qty>0)totalMin+=qty*CARPET_ROOMS[k].duration;});
  Object.keys(UPHOL_ITEMS).forEach(function(k){var qty=getQty(k+'-'+mid);if(qty>0)totalMin+=qty*UPHOL_ITEMS[k].duration;});
  // Minimum job is 1 hour (per Kashian Bros scheduling rules)
  if(totalMin>0&&totalMin<60)totalMin=60;
  return totalMin;
}
function fmtDuration(mins){
  if(mins===0)return'0 min';
  if(mins<60)return mins+' min';
  var h=Math.floor(mins/60),m=mins%60;
  if(m===0)return h+(h===1?' hour':' hours');
  return h+'h '+m+'m';
}
// Customer-facing display: rounds UP to nearest 10 minutes for cleaner visuals.
// Internal logic still uses exact mins via fmtDuration().
function fmtDurationRounded(mins){
  if(mins===0)return'0 min';
  var rounded=Math.ceil(mins/10)*10;
  return fmtDuration(rounded);
}

function calcRugScopePrice(mid){
  var container=document.getElementById('rs-rug-rows-'+mid);
  if(!container)return;
  var totalSqft=0,rugCount=0,oversizeCount=0;
  var rugDesc=[];
  function roundFt(ft,inches){return (parseInt(ft)||0)+((parseInt(inches)||0)>=6?1:0);}
  var rows=container.querySelectorAll('.bk-rug-size-row');
  rows.forEach(function(row,i){
    var n=i+1;
    var wftEl=document.getElementById('rs-rug-wft'+n+'-'+mid);
    var winEl=document.getElementById('rs-rug-win'+n+'-'+mid);
    var hftEl=document.getElementById('rs-rug-hft'+n+'-'+mid);
    var hinEl=document.getElementById('rs-rug-hin'+n+'-'+mid);
    if(!wftEl||!hftEl)return;
    var w=roundFt(wftEl.value,winEl?winEl.value:0);
    var h=roundFt(hftEl.value,hinEl?hinEl.value:0);
    if(w<=0||h<=0)return;
    rugCount++;
    totalSqft+=w*h;
    var maxDim=Math.max(w,h),minDim=Math.min(w,h);
    if(maxDim>15||minDim>10)oversizeCount++;
    var wOrig=(parseInt(wftEl.value)||0)+(winEl&&parseInt(winEl.value)>0?"'"+winEl.value+'"':'ft');
    var hOrig=(parseInt(hftEl.value)||0)+(hinEl&&parseInt(hinEl.value)>0?"'"+hinEl.value+'"':'ft');
    rugDesc.push(wOrig+' x '+hOrig+' (billed as '+w+'x'+h+')');
  });
  var priceBox=document.getElementById('rs-price-box-'+mid);
  var durBox=document.getElementById('scope-duration-'+mid);
  var findBtn=document.getElementById('find-times-'+mid);
  if(rugCount===0){
    if(priceBox)priceBox.style.display='none';
    if(durBox){durBox.innerHTML='<small style="color:#1e40af">Add at least one rug to see your estimate</small>';durBox.style.background='#f1f5f9';durBox.style.borderColor='#cbd5e1';}
    if(findBtn){findBtn.disabled=true;findBtn.style.opacity='0.4';findBtn.style.cursor='not-allowed';}
    return;
  }
  var basePrice=Math.max(199,totalSqft*4.00);
  var protectEl=document.getElementById('rs-protect-'+mid);
  var enzymeEl=document.getElementById('rs-enzyme-'+mid);
  var protect=(protectEl&&protectEl.checked)?totalSqft*2:0;
  var enzyme=(enzymeEl&&enzymeEl.checked)?totalSqft*2:0;
  var total=basePrice+protect+enzyme;
  var breakdown='<div class="rs-price-line">Rug Cleaning ('+totalSqft+' sq ft): <strong>$'+basePrice.toFixed(2)+'</strong></div>';
  if(protect>0)breakdown+='<div class="rs-price-line">Fiber Protectant: <strong>$'+protect.toFixed(2)+'</strong></div>';
  if(enzyme>0)breakdown+='<div class="rs-price-line">Enzyme Treatment: <strong>$'+enzyme.toFixed(2)+'</strong></div>';
  breakdown+='<div class="rs-price-total">Estimated Total: <strong>$'+total.toFixed(2)+'</strong></div>';
  breakdown+='<div class="rs-price-note">$199 minimum applies. 7-10 day turnaround.</div>';
  if(priceBox){priceBox.innerHTML=breakdown;priceBox.style.display='block';}
  var pickupMin=calcRugDuration(rugCount,oversizeCount);
  if(durBox){durBox.innerHTML='Estimated pickup time: <strong>'+fmtDurationRounded(pickupMin)+'</strong>';durBox.style.background='#eff6ff';durBox.style.borderColor='#60a5fa';}
  if(findBtn){findBtn.disabled=false;findBtn.style.opacity='1';findBtn.style.cursor='pointer';}
  // Stash data on the form element so submitRugScope can read it
  var formEl=document.getElementById('scope-'+mid);
  if(formEl){
    formEl.dataset.rugDesc=rugDesc.join(', ');
    formEl.dataset.rugCount=rugCount;
    formEl.dataset.rugSqft=totalSqft;
    formEl.dataset.rugTotal=total.toFixed(2);
    formEl.dataset.rugBase=basePrice.toFixed(2);
    formEl.dataset.rugProtect=protect.toFixed(2);
    formEl.dataset.rugEnzyme=enzyme.toFixed(2);
    formEl.dataset.rugDuration=pickupMin;
  }
}

function submitRugScope(mid){
  var formEl=document.getElementById('scope-'+mid);
  if(!formEl||!formEl.dataset.rugCount||parseInt(formEl.dataset.rugCount)===0){alert('Please add at least one rug.');return;}
  var rugCount=parseInt(formEl.dataset.rugCount);
  var pickupMin=parseInt(formEl.dataset.rugDuration);
  var protectEl=document.getElementById('rs-protect-'+mid);
  var enzymeEl=document.getElementById('rs-enzyme-'+mid);
  flow.scope={
    isRug:true,
    rugDesc:formEl.dataset.rugDesc,
    rugCount:rugCount,
    rugSqft:parseInt(formEl.dataset.rugSqft),
    rugTotal:parseFloat(formEl.dataset.rugTotal),
    rugBase:parseFloat(formEl.dataset.rugBase),
    rugProtect:parseFloat(formEl.dataset.rugProtect),
    rugEnzyme:parseFloat(formEl.dataset.rugEnzyme),
    cProtect:protectEl&&protectEl.checked,
    cEnzyme:enzymeEl&&enzymeEl.checked,
    durationMin:pickupMin,
    cardId:mid,
    // Compatibility shims so generic functions don't crash on missing fields
    carpetLines:[],upholLines:[],upholSubtotal:0,
    uProtect:false,uEnzyme:false,uAntibac:false
  };
  flow.duration=pickupMin;
  advanceToStage2(mid);
  fetchAndRenderSlots(mid);
}

function calcRugPrice(mid){
  var container=document.getElementById('bk-rug-rows-'+mid);
  var totalSqft=0;var rugDesc=[];
  function roundFt(ft,inches){return (parseInt(ft)||0)+((parseInt(inches)||0)>=6?1:0);}
  if(container){
    var rows=container.querySelectorAll('.bk-rug-size-row');
    rows.forEach(function(row,i){
      var count=i+1;
      var wftEl=document.getElementById('bk-rug-wft'+count+'-'+mid);
      var winEl=document.getElementById('bk-rug-win'+count+'-'+mid);
      var hftEl=document.getElementById('bk-rug-hft'+count+'-'+mid);
      var hinEl=document.getElementById('bk-rug-hin'+count+'-'+mid);
      if(wftEl&&hftEl){
        var w=roundFt(wftEl.value,winEl?winEl.value:0);
        var h=roundFt(hftEl.value,hinEl?hinEl.value:0);
        if(w>0&&h>0){
          totalSqft+=w*h;
          var wOrig=(parseInt(wftEl.value)||0)+(winEl&&parseInt(winEl.value)>0?"'"+winEl.value+'"':'ft');
          var hOrig=(parseInt(hftEl.value)||0)+(hinEl&&parseInt(hinEl.value)>0?"'"+hinEl.value+'"':'ft');
          rugDesc.push(wOrig+' x '+hOrig+' (billed as '+w+'x'+h+')');
        }
      }
    });
  }
  var detEl=document.getElementById('bk-detail-'+mid);
  if(detEl)detEl.value=rugDesc.join(', ');
  var priceRow=document.getElementById('bk-price-row-'+mid);
  var priceEl=document.getElementById('bk-price-'+mid);
  if(!priceRow)return;
  if(totalSqft===0){priceRow.style.display='none';return;}
  var basePrice=Math.max(199,totalSqft*4.00);
  var protectEl=document.getElementById('bk-protect-'+mid);
  var enzymeEl=document.getElementById('bk-enzyme-'+mid);
  var protect=(protectEl&&protectEl.checked)?totalSqft*2:0;
  var enzyme=(enzymeEl&&enzymeEl.checked)?totalSqft*2:0;
  var total=basePrice+protect+enzyme;
  var breakdown='Rug Cleaning: $'+basePrice.toFixed(2);
  if(protect>0)breakdown+='<br>Fiber Protectant: $'+protect.toFixed(2);
  if(enzyme>0)breakdown+='<br>Enzyme Treatment: $'+enzyme.toFixed(2);
  breakdown+='<br><strong>Total: $'+total.toFixed(2)+'</strong>';
  breakdown+='<br><small style="color:#166534">$199 minimum applies.</small>';
  priceEl.innerHTML=breakdown;
  priceRow.style.display='block';

// "Edit" link on the info summary line -> jump back to the info form
function editInfo(mid){
  // The info card stays in DOM (just hidden) with the customer's previous values.
  // Re-show it; the user can edit and click Continue again.
  if(flow.customerInfo&&flow.customerInfo.cardId){
    var infoCard=document.getElementById('info-'+flow.customerInfo.cardId);
    if(infoCard){
      infoCard.style.display='';
      // Remove the scope card that was previously generated, so a fresh one will be created on Continue.
      var scopeCard=document.getElementById('scope-'+mid);
      if(scopeCard){
        // Find and remove the entire chat row that contains this scope card
        var row=scopeCard.closest('.row');
        if(row)row.remove();
        else scopeCard.remove();
      }
      // Also clear timeChoice and scope so user starts fresh from scope picker
      flow.scope=null;flow.timeChoice=null;
      // Scroll to info card
      infoCard.scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
  }
  alert('Please refresh and start a new booking to change your info.');
}

function cancelScope(id){var f=document.getElementById('scope-'+id);if(f)f.innerHTML='<p style="color:#333;font-size:13px">No problem! Call us at <strong>(847) 251-1200</strong> or email <strong>info@kashianbros.com</strong>!</p>';flow.active=false;}

function submitScope(mid){
  var mins=calcJobDuration(mid);
  if(mins===0){alert('Please pick at least one room or upholstery item.');return;}
  var carpetLines=[],upholLines=[];
  Object.keys(CARPET_ROOMS).forEach(function(k){var qty=getQty(k+'-'+mid);if(qty>0)carpetLines.push(qty+'x '+CARPET_ROOMS[k].name);});
  Object.keys(UPHOL_ITEMS).forEach(function(k){var qty=getQty(k+'-'+mid);if(qty>0)upholLines.push(qty+'x '+UPHOL_ITEMS[k].name);});
  var cProtect=document.getElementById('c-protect-'+mid);var cEnzyme=document.getElementById('c-enzyme-'+mid);
  var uProtect=document.getElementById('u-protect-'+mid);var uEnzyme=document.getElementById('u-enzyme-'+mid);var uAntibac=document.getElementById('u-antibac-'+mid);
  var upholSubtotal=0;
  Object.keys(UPHOL_ITEMS).forEach(function(k){var qty=getQty(k+'-'+mid);if(qty>0)upholSubtotal+=qty*UPHOL_ITEMS[k].price;});
  flow.scope={
    carpetLines:carpetLines,upholLines:upholLines,
    cProtect:cProtect&&cProtect.checked,cEnzyme:cEnzyme&&cEnzyme.checked,
    uProtect:uProtect&&uProtect.checked,uEnzyme:uEnzyme&&uEnzyme.checked,uAntibac:uAntibac&&uAntibac.checked,
    durationMin:mins,
    upholSubtotal:upholSubtotal,
    cardId:mid // remember the card so we can advance it later
  };
  var hasCarpet=carpetLines.length>0,hasUphol=upholLines.length>0;
  flow.service=hasCarpet&&hasUphol?'both':(hasCarpet?'carpet':'upholstery');
  flow.duration=mins;
  // Advance the SAME card to stage 2 (no new chat bubbles)
  advanceToStage2(mid);
  fetchAndRenderSlots(mid);
}

// Stage 1 -> Stage 2: collapse pickers into a summary line, show times area
function advanceToStage2(mid){
  var card=document.getElementById('scope-'+mid);
  if(!card)return;
  // Hide the picker sections
  var pickers=card.querySelectorAll('.flow-stage-1');
  pickers.forEach(function(el){el.style.display='none';});
  // Replace header + show stage 2 (times) area
  var topSummary=document.getElementById('flow-top-summary-'+mid);
  if(topSummary){
    topSummary.style.display='block';
    topSummary.innerHTML=buildInfoSummaryLine(mid)+buildScopeSummaryLine(mid);
  }
  // Show the stage-2 container
  var stage2=document.getElementById('flow-stage-2-'+mid);
  if(stage2)stage2.style.display='block';
}

function buildInfoSummaryLine(mid){
  var ci=flow.customerInfo;
  if(!ci)return '';
  var disp=ci.fname+' '+ci.lname+' &mdash; '+ci.addr;
  if(disp.length>70)disp=ci.fname+' '+ci.lname+' &mdash; '+ci.addr.substring(0,50)+'...';
  return '<div class="flow-summary-row"><div class="flow-summary-text"><span class="flow-check">&#x2713;</span> '+disp+'</div><button class="flow-edit-btn" onclick="editInfo(\''+mid+'\')">edit</button></div>';

function buildScopeSummaryLine(mid){
  var summary;
  if(flow.scope.isRug){
    summary=flow.scope.rugCount+(flow.scope.rugCount===1?' rug':' rugs')+' ('+flow.scope.rugSqft+' sq ft) &mdash; <strong>$'+flow.scope.rugTotal.toFixed(2)+'</strong>';

function buildTimeSummaryLine(mid){

// "Edit" link on scope summary -> back to stage 1
function editScope(mid){
  var card=document.getElementById('scope-'+mid);
  if(!card)return;
  // Re-show pickers
  var pickers=card.querySelectorAll('.flow-stage-1');
  pickers.forEach(function(el){el.style.display='';});

  var btns=card.querySelectorAll('.flow-stage-1 button, .flow-stage-1 input');

}

// "Edit" link on time summary -> back to stage 2
function editTime(mid){
  var stage3=document.getElementById('flow-stage-3-'+mid);if(stage3){stage3.style.display='none';stage3.innerHTML='';}
  // Show the times again
  var stage2=document.getElementById('flow-stage-2-'+mid);if(stage2)stage2.style.display='block';
  // Keep info + scope summary, drop time summary
  var topSummary=document.getElementById('flow-top-summary-'+mid);
  if(topSummary)topSummary.innerHTML=buildInfoSummaryLine(mid)+buildScopeSummaryLine(mid);
  flow.timeChoice=null;

async function fetchAndRenderSlots(mid){
  var stage2=document.getElementById('flow-stage-2-'+mid);
  if(!stage2)return;
  stage2.innerHTML='<div class="flow-stage-hdr">Pick a time</div><div class="flow-loading">Checking our schedule...</div>';
  var type=flow.type==='rug'?'RUG':'CARPET';
  try{
    var r=await fetch('/.netlify/functions/availability?duration='+flow.duration+'&type='+type);
    if(!r.ok)throw new Error('HTTP '+r.status);
    var d=await r.json();
    if(d.slots&&d.slots.length){
      var html='<div class="flow-stage-hdr">Pick a time</div>';
      html+='<div class="flow-times-grid">';
      d.slots.slice(0,4).forEach(function(s){
        html+='<button class="flow-time-btn" onclick="pickTime(\''+mid+'\',\''+s.label.replace(/'/g,"\\'")+'\')">'+s.label+'</button>';
      });
      html+='</div>';
      html+='<button class="flow-time-other" onclick="pickCustomTime(\''+mid+'\')">I have a different time in mind</button>';
      stage2.innerHTML=html;
    } else {
      stage2.innerHTML='<div class="flow-stage-hdr">Pick a time</div><div class="flow-empty">Our schedule is quite full for a '+fmtDurationRounded(flow.duration)+' job in the next two weeks. Please call us at <strong>(847) 251-1200</strong>.</div>';
    }
  }catch(e){
    stage2.innerHTML='<div class="flow-stage-hdr">Pick a time</div><div class="flow-empty">Connection error: '+e.message+'. Please call <strong>(847) 251-1200</strong>.</div>';
  }
}

function pickTime(mid,label){
  flow.timeChoice=label;
  // Collapse stage 2
  var stage2=document.getElementById('flow-stage-2-'+mid);if(stage2)stage2.style.display='none';
  // Top summary: info + scope + time
  var topSummary=document.getElementById('flow-top-summary-'+mid);
  if(topSummary)topSummary.innerHTML=buildInfoSummaryLine(mid)+buildScopeSummaryLine(mid)+buildTimeSummaryLine(mid);
  // Show stage 3 (review form)
  advanceToStage3(mid);
}

function pickCustomTime(mid){

// Final submit when user clicks "Send Booking Request" on the review card.
// Combines flow.customerInfo + flow.scope + flow.timeChoice and posts to the booking endpoint.
function submitFinalBooking(mid){
  var ci=flow.customerInfo;
  if(!ci){alert('Missing customer info. Please start over.');return;}
  var sc=flow.scope||{};
  var name=(ci.fname+' '+ci.lname).trim();
  var detail='';
  var priceInfo='';
  var svc='CARPET',lbl='Carpet Cleaning';
  if(sc.isRug){
    svc='RUG_PICKUP';lbl='Rug Pickup and Delivery';
    detail=sc.rugDesc||'';
    priceInfo='Rugs: '+sc.rugDesc+' ('+sc.rugSqft+' sq ft) | Base: $'+sc.rugBase.toFixed(2);
    if(sc.rugProtect>0)priceInfo+=' + Protectant: $'+sc.rugProtect.toFixed(2);
    if(sc.rugEnzyme>0)priceInfo+=' + Enzyme: $'+sc.rugEnzyme.toFixed(2);
    priceInfo+=' | Estimated total: $'+sc.rugTotal.toFixed(2);
    priceInfo+=' | Est. pickup time: '+fmtDuration(sc.durationMin);
  } else if(flow.scope){
    var hasCarpet=sc.carpetLines&&sc.carpetLines.length>0;
    var hasUphol=sc.upholLines&&sc.upholLines.length>0;
    if(hasCarpet&&hasUphol){svc='CARPET';lbl='Carpet & Upholstery Cleaning';}
    else if(hasUphol){svc='UPHOLSTERY';lbl='Upholstery Cleaning';}
    else{svc='CARPET';lbl='Carpet Cleaning';}

function flowMsg(text,buttons){var msg=text;if(buttons&&buttons.length)msg+='\n[BUTTONS:'+buttons.join('|')+']';hist.push({role:'assistant',content:text});addMsg('assistant',msg,cnt);}
function handleInput(text,btn){
  if(btn){var par=btn.parentNode;if(par){var sibs=par.querySelectorAll('.inline-btn');for(var i=0;i<sibs.length;i++){sibs[i].disabled=true;sibs[i].style.opacity='0.4';}}}
  if(text==='Schedule a Pickup'){addMsg('user',text,cnt);hist.push({role:'user',content:text});startRugFlow();return;}
  if(flow.active)handleFlowButton(text);
  else send(text);
}
function disableBubbles(wrap){var btns=wrap.querySelectorAll('.inline-btn');for(var i=0;i<btns.length;i++){btns[i].disabled=true;btns[i].style.opacity='0.4';}}
function startCarpetFlow(){
  document.getElementById('qw').style.display='none';
  flow={active:true,type:'carpet_upholstery',step:'info',service:null,rugCount:null,detail:null,duration:0,address:null,awaitingText:false,scope:null,customerInfo:null,timeChoice:null};
  addMsg('user','Schedule Carpet & Upholstery Cleaning',cnt);
  hist.push({role:'user',content:'Schedule Carpet & Upholstery Cleaning'});
  flowMsg('Happy to help! Let\'s get you scheduled. First, tell us a bit about you.\n[SHOW_INFO_FORM:CARPET]');
}
function startRugFlow(){
  document.getElementById('qw').style.display='none';
  flow={active:true,type:'rug',step:'info',service:'rug',rugCount:null,detail:null,duration:0,address:null,awaitingText:false,scope:null,customerInfo:null,timeChoice:null};
  addMsg('user','Schedule Rug Pickup',cnt);
  hist.push({role:'user',content:'Schedule Rug Pickup'});
  flowMsg('Happy to help with your rug pickup! Let\'s get you scheduled. First, tell us a bit about you.\n[SHOW_INFO_FORM:RUG]');
}

// Rug duration math (per Kashian Bros scheduling sheet)
function calcRugDuration(numRugs,oversizeCount){
  var base=0;
  if(numRugs===1)base=15;
  else if(numRugs<=3)base=25;
  else base=45;
  // Add 15 min for each rug over 10x15
  return base+(oversizeCount*15);
}
function handleFlowButton(text){
  if(flow.step==='time_choice'){
    if(text==='I have a different time in mind'){
      addMsg('user',text,cnt);hist.push({role:'user',content:text});
      flow.step='custom_time';flow.awaitingText=true;
      flowMsg('What date and time works for you? For example: Monday May 5 at 10:00 AM');
    } else {
      addMsg('user',text,cnt);hist.push({role:'user',content:text});
      var parts=text.split(' at ');var dateStr=parts[0]||'';var timeStr=parts[1]||'';
      showBookingFormFromFlow(dateStr,timeStr);
    }
  }
}
function showBookingFormFromFlow(dateStr,timeStr){
  var svc=flow.type==='rug'?'RUG_PICKUP':flow.service==='upholstery'?'UPHOLSTERY':'CARPET';
  var fakeReply='Great! Please fill in your details below and we will get you all set! [SHOW_BOOKING_FORM:'+svc+'|||||'+(flow.detail||'')+'|'+dateStr+'|'+timeStr+']';
  hist.push({role:'assistant',content:'Great! Please fill in your details below and we will get you all set!'});
  addMsg('assistant',fakeReply,cnt);flow.active=false;
}
function handleFlowText(text){
  if(flow.step==='custom_time'){
    addMsg('user',text,cnt);hist.push({role:'user',content:text});
    flow.awaitingText=false;
    flowMsg('Let me check if that time is available...');
    checkCustomTime(text);
  }
}
async function checkCustomTime(requestedTime){
  var type=flow.type==='rug'?'RUG':'CARPET';
  try{
    var r=await fetch('/.netlify/functions/availability?duration='+flow.duration+'&type='+type);
    var d=await r.json();
    if(d.slots&&d.slots.length){
      var btns=d.slots.slice(0,4).map(function(s){return s.label;});
      btns.push('I have a different time in mind');
      flowMsg('Sorry, that time is not available. Here are our next open slots:',btns);
      flow.step='time_choice';
    } else {
      flowMsg('Our schedule is quite full right now. Please call us at (847) 251-1200 and we will find you a time!');
      flow.active=false;
    }
  }catch(e){flowMsg('I had trouble checking the schedule. Please call (847) 251-1200!');flow.active=false;}
}
async function checkAvailabilityForFlow(){
  var type=flow.type==='rug'?'RUG':'CARPET';
  try{
    var r=await fetch('/.netlify/functions/availability?duration='+flow.duration+'&type='+type);
    if(!r.ok)throw new Error('HTTP '+r.status);
    var d=await r.json();
    if(d.slots&&d.slots.length){
      flow.step='time_choice';
      var btns=d.slots.slice(0,4).map(function(s){return s.label;});
      btns.push('I have a different time in mind');
      var msg=flow.type==='rug'?'Here are our next available pickup times. Which works best?':'Here are our next available times that fit your '+fmtDuration(flow.duration)+' job. Which works best?';
      flowMsg(msg,btns);
    } else {
      flowMsg('Our schedule is quite full for a '+fmtDuration(flow.duration)+' job in the next two weeks. Please call us at (847) 251-1200 and we will find you a time!');
      flow.active=false;
    }
  }catch(e){flowMsg('Connection error: '+e.message+'. Please call (847) 251-1200!');flow.active=false;}
}
function showMainButtons(){
  var msgs=document.getElementById('msgs');
  var lastRow=msgs.lastElementChild;
  if(!lastRow)return;
  var bub=lastRow.querySelector('.bub');
  if(!bub)return;
  var wrap=document.createElement('div');
  wrap.style.cssText='display:flex;flex-wrap:wrap;gap:7px;margin-top:12px';
  var bubbles=[
    {label:'Schedule Carpet & Upholstery Cleaning',fn:function(){disableBubbles(wrap);startCarpetFlow();}},
    {label:'Schedule Rug Pickup',fn:function(){disableBubbles(wrap);startRugFlow();}},
    {label:'Rug Cleaning Prices',fn:function(){disableBubbles(wrap);send('I would like to know about rug cleaning prices');}},
    {label:'My dog had an accident on my rug',fn:function(){disableBubbles(wrap);send('My dog had an accident on my rug');}},
    {label:'I spilled red wine - what do I do?',fn:function(){disableBubbles(wrap);send('I spilled red wine - what do I do?');}},
    {label:'How much is a rug pad?',fn:function(){disableBubbles(wrap);send('How much is a rug pad?');}},
    {label:'Tell me about wood floor refinishing',fn:function(){disableBubbles(wrap);send('Tell me about wood floor refinishing');}},
    {label:'Kitchen & Bathroom Remodeling',fn:function(){disableBubbles(wrap);send('Tell me about your kitchen and bathroom remodeling services');}},
    {label:'Carpet & Area Rugs',fn:function(){disableBubbles(wrap);send('Tell me about your carpet and area rug sales');}},
    {label:'Ask a Question',fn:function(){disableBubbles(wrap);send('I have a question');}}
  ];
  bubbles.forEach(function(b){
    var btn=document.createElement('button');
    btn.className='inline-btn';
    btn.textContent=b.label;
    btn.onclick=b.fn;
    wrap.appendChild(btn);
  });
  bub.appendChild(wrap);
  document.getElementById('qw').style.display='none';
}
function send(text){
  if(!text||!text.trim())return;
  if(flow.active&&flow.awaitingText){flow.awaitingText=false;handleFlowText(text.trim());document.getElementById('inp').value='';return;}
  document.getElementById('qw').style.display='none';
  document.getElementById('inp').value='';
  document.getElementById('sb').disabled=true;
  var id=cnt;
  addMsg('user',text,id);
  hist.push({role:'user',content:text});
  addTyping();
  fetch('/.netlify/functions/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,system:SP+(availCache?'\n\n'+availCache:''),messages:hist})}).then(function(r){return r.json();}).then(function(data){
    var reply=data.content&&data.content[0]?data.content[0].text:'I had trouble with that. Please call (847) 251-1200!';
    var t=document.getElementById('typing');if(t)t.remove();
    hist.push({role:'assistant',content:reply});
    addMsg('assistant',reply,cnt);
  }).catch(function(){
    var t=document.getElementById('typing');if(t)t.remove();
    addMsg('assistant','I am having trouble connecting. Please call (847) 251-1200 or email info@kashianbros.com!',cnt);
  }).finally(function(){document.getElementById('sb').disabled=false;});
}
addMsg('assistant','Hi! I am Kay from Kashian Bros. How can I help you today?',0);
showMainButtons();
</script>
