function startRugFlow(){document.getElementById("qw").style.display="none";flow={active:true,type:"rug",step:"show_slots",service:"rug",rugCount:null,detail:null,duration:45,address:null,awaitingText:false};addMsg("user","Schedule Rug Pickup",cnt);hist.push({role:"user",content:"Schedule Rug Pickup"});flowMsg("Let me check our pickup schedule...");checkAvailabilityForFlow();}
function handleFlowButton(text){
  if(flow.step==="service_choice"){
    addMsg("user",text,cnt);hist.push({role:"user",content:text});
    flow.service=text.toLowerCase();
    flow.duration=text==="Both"?180:120;
    flow.step="show_slots";
    flowMsg("Let me check our schedule...");
    checkAvailabilityForFlow();
  }
  else if(flow.step==="time_choice"){
    if(text==="I have a different time in mind"){
      addMsg("user",text,cnt);hist.push({role:"user",content:text});
      flow.step="custom_time";flow.awaitingText=true;
      flowMsg("What date and time works for you? For example: Monday May 5 at 10am");
    } else {
      addMsg("user",text,cnt);hist.push({role:"user",content:text});
      var parts=text.split(" at ");var dateStr=parts[0]||"";var timeStr=parts[1]||"";
      showBookingFormFromFlow(dateStr,timeStr);
    }
  }
  else if(flow.step==="price_schedule"){
    addMsg("user",text,cnt);hist.push({role:"user",content:text});
    if(text==="Schedule a Pickup"){
      flow={active:true,type:"rug",step:"show_slots",service:"rug",rugCount:null,detail:null,duration:45,address:null,awaitingText:false};
      flowMsg("Let me check our pickup schedule...");checkAvailabilityForFlow();
    } else {
      flow.active=false;
      flowMsg("Feel free to ask any other questions or call us at (847) 251-1200!");
    }
  }
}
function showBookingFormFromFlow(dateStr,timeStr){
  var svc=flow.type==="rug"?"RUG_PICKUP":flow.service==="upholstery"?"UPHOLSTERY":"CARPET";
  var fakeReply="Great! Please fill in your details below and we will get you all set! [SHOW_BOOKING_FORM:"+svc+"||||||||"+dateStr+"|"+timeStr+"]";
  hist.push({role:"assistant",content:"Great! Please fill in your details below and we will get you all set!"});
  addMsg("assistant",fakeReply,cnt);flow.active=false;
}
function handleFlowText(text){
  if(flow.step==="custom_time"){
    addMsg("user",text,cnt);hist.push({role:"user",content:text});
    flow.awaitingText=false;
    flowMsg("Let me check if that time is available...");
    checkCustomTime(text);
  }
}
async function checkCustomTime(requestedTime){
  var type=flow.type==="rug"?"RUG":"CARPET";
  try{
    var r=await fetch("/.netlify/functions/availability?duration="+flow.duration+"&type="+type);
    var d=await r.json();
    if(d.slots&&d.slots.length){
      var match=d.slots.find(function(s){return s.label.toLowerCase().indexOf(requestedTime.toLowerCase().split(" ")[0])>-1;});
      if(match){
        flow.step="time_choice";
        showBookingFormFromFlow(match.label.split(" at ")[0],match.label.split(" at ")[1]);
      } else {
        flow.step="time_choice";
        var btns=d.slots.slice(0,4).map(function(s){return s.label;});
        btns.push("I have a different time in mind");
        flowMsg("That time is not available. Here are our nearest open slots:",btns);
      }
    } else {
      flowMsg("Our schedule is quite full right now. Please call us at (847) 251-1200 and we will find you a time!");
      flow.active=false;
    }
  }catch(e){flowMsg("I had trouble checking the schedule. Please call (847) 251-1200!");flow.active=false;}
}
async function checkAvailabilityForFlow(){var type=flow.type==="rug"?"RUG":"CARPET";try{var r=await fetch("/.netlify/functions/availability?duration="+flow.duration+"&type="+type);var d=await r.json();if(d.slots&&d.slots.length){flow.step="time_choice";var btns=d.slots.slice(0,4).map(function(s){return s.label;});btns.push("I have a different time in mind");flowMsg("Here are our next available times. Which works best for you?",btns);}else{flowMsg("Our schedule is quite full right now. Please call us at (847) 251-1200 and we will find you a time!");flow.active=false;}}catch(e){flowMsg("I had trouble checking the schedule. Please call (847) 251-1200!");flow.active=false;}}
