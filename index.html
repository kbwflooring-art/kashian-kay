<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#eef2f7;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px}

.bk-form{background:#fff;border:2px solid #1a5f7a;border-radius:12px;padding:16px;margin-top:8px;font-size:13px}
.bk-form h3{color:#1a5f7a;font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.bk-row{margin-bottom:10px}
.bk-label{display:block;font-size:11.5px;font-weight:600;color:#475569;margin-bottom:3px}
.bk-input{width:100%;border:1.5px solid #d0e8f2;border-radius:7px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;color:#1a202c}
.bk-input:focus{border-color:#1a5f7a}
.bk-select{width:100%;border:1.5px solid #d0e8f2;border-radius:7px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;color:#1a202c;background:#fff}
.bk-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bk-check{display:flex;align-items:center;gap:6px;margin-bottom:8px;cursor:pointer;font-size:13px}
.bk-check input{width:15px;height:15px;accent-color:#1a5f7a}
.bk-submit{background:#1a5f7a;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13.5px;font-weight:600;cursor:pointer;width:100%;margin-top:4px;font-family:inherit}
.bk-submit:hover{background:#1e7598}
.bk-cancel{background:none;border:1px solid #d0e8f2;color:#64748b;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;width:100%;margin-top:6px;font-family:inherit}
.bk-success{background:#f0fdf4;border:2px solid #16a34a;border-radius:12px;padding:16px;margin-top:8px;text-align:center}
.bk-success h3{color:#15803d;margin-bottom:6px}
.bk-success p{font-size:12.5px;color:#166534}
.bk-note{background:#fef9c3;border:1px solid #fcd34d;border-radius:6px;padding:7px 10px;font-size:11.5px;color:#92400e;margin-bottom:10px}
.contact-toggle{display:none}
@media(max-width:600px){.side{display:none}}

<script>
var SP = 'You are Kay, a warm expert customer service rep for Kashian Bros, family-owned floor covering and cleaning company serving North Shore Chicago since 1910. Genuine warmth, real expertise. Use we and our team naturally.\n\nABOUT: Founded 1910 by Haig and Greg Kashian. Owner Doug Stein since 2006. NextDoor Neighborhood Favorite.\nWILMETTE: 1107 Greenleaf Ave Wilmette IL 60091 Mon-Fri 8:30am-5pm Sat 10am-3pm (847) 251-1200\nLAKE FOREST: 838 N Western Ave Lake Forest IL 60045 Mon-Fri 9am-5pm Sat 10am-3pm (847) 295-3737\nPHONE: (847) 807-8246 EMAIL: info@kashianbros.com\n\nDROP-OFF: Never mention Evanston. Rug 5x8 or under Wilmette or Lake Forest. Rug over 5x8 Wilmette only or pickup.\n\nIN-HOME RUG CLEANING: We DO offer this. Qualify: needs rug pad no border no fringe not sisal seagrass. Price $2 per sqft IN-HOME ONLY $199 min. Fiber protectant $2 per sqft. Enzyme for pets $2 per sqft. Plant cleaning is deeper sonic vibration rotary scrubbing 3000 RPM centrifuge dry room.\n\nRUG PAD: Ask rug or pad size. Pad 2 inches shorter each dimension. 6ft roll if pad 6ft or under. 12ft roll if pad 6-12ft. Price = roll width x length x $2. $48 min. Default FIRMGRIP.\nExamples: 9x12 rug 12ft roll 12x12x2=$288. 6x9 rug 6ft roll 6x9x2=$108. 5x8 rug 6ft roll 6x8x2=$96.\n\nCARPET: $0.75 per sqft. Stairs $12 each. Protectant $0.35 per sqft. Enzyme $0.35 per sqft. $199 min.\n\nUPHOLSTERY: Sofa loveseat sectional $35 per linear ft. Chair $100. Wing chair $70. Ottoman $75. Dining chair $40. Pillows $15. $199 min.\n\nRUG PLANT: Drop-off $3.25 per sqft. Pickup delivery $4.00 per sqft. $199 min per pickup. 7-10 days.\n\nWOOD FLOORS: We are a leader. We move ALL furniture ourselves never pods never movers. First half floor completely then move furniture onto finished floor complete second half. Everything back in original spot. Dust Free sanding. Water-based polyurethane only. Stains light to dark espresso applied to actual floor for approval. Free in-home estimate always.\n\nREMODELING: Full service kitchen and bathroom. Free consultation. Dedicated project manager. J&K Cabinetry and KB Custom Amish. Countertops Cambria Caesarstone Raphael Stone. Hardware HAFELE and Schaub.\n\nVINYL: CORETEC leading brand not USA made. ENGINEERED FLOORS made in USA. Water resistant scratch resistant.\n\nCARPET SALES: Custom in-stock quick-ship rugs online at kashianbros.com.\n\nCOMMERCIAL: High-rise uses portable equipment standard practice.\n\nRUG REPAIR: Fringe $21 per ft both ends width x 2 x $21 $125 min.\n\nSTAIN: Blot never scrub. Pet blot warm water dish soap vinegar. Wine blot club soda. Mud let dry first. Blood cold water.\n\nSCHEDULING - BOOKING REQUESTS:\nWhen a customer wants to schedule carpet cleaning, upholstery cleaning, or rug pickup, collect enough info to give a price estimate, confirm service area, then say exactly: [SHOW_BOOKING_FORM:service_type] where service_type is CARPET, UPHOLSTERY, or RUG_PICKUP.\n\nSERVICE AREAS:\n- Standard (book directly): All North Shore communities - Wilmette, Kenilworth, Winnetka, Northfield, Glencoe, Highland Park, Lake Forest, Lake Bluff, Northbrook, Deerfield, Glenview, Evanston, Skokie and all surrounding North Shore towns.\n- Chicago city addresses: Tell customer our cleaning manager will personally handle their booking, then show form noting Chicago.\n- Other areas: Advise to call (847) 251-1200.\n\nSCHEDULING RULES:\nCarpet/Upholstery: Mon-Fri. First job 9am. Larger jobs morning preferred. Last job 3pm (4pm small jobs).\nRug Pickup: Tuesdays and Thursdays only, 8am-4pm. Redelivery scheduled separately when rug is ready (7-10 days).\nBook as far out as desired.';
var hist=[],fbLog=[],cnt=1;
function mk(tag,cls,attrs){var el=document.createElement(tag);if(cls)el.className=cls;if(attrs)Object.keys(attrs).forEach(function(k){el.setAttribute(k,attrs[k]);});return el;}
function nl2html(t){return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').split('\n').map(function(l){var b=l.match(/^- (.*)/);return b?'<li>'+b[1]+'</li>':(l.trim()?'<p>'+l+'</p>':'');}).join('').replace(/(<li>.*?<\/li>)+/g,function(m){return'<ul>'+m+'</ul>';});}
function getConfirmTiming(){var now=new Date(),day=now.getDay(),hr=now.getHours(),min=now.getMinutes(),tv=hr+min/60;if(day===0)return'Our team is closed today (Sunday). Adolfo will confirm your booking first thing Monday morning.';if(day===6){if(tv<10)return'Our team opens at 10am on Saturdays — Adolfo will confirm your booking by 10am today.';if(tv<15)return'Adolfo will confirm your booking within about an hour, and always before we close today at 3pm.';return'Our Saturday hours have ended. Adolfo will confirm your booking first thing Monday morning.';}if(tv<9)return'Our team starts at 9am — Adolfo will confirm your booking by then this morning.';if(tv<17)return'Adolfo will confirm your booking within about an hour, and always before 5pm today.';return'Our team has closed for the day. Adolfo will confirm your booking first thing tomorrow morning.';}
function buildBookingForm(svc,mid){var isRug=svc==='RUG_PICKUP',isCarpet=svc==='CARPET',lbl=isRug?'Rug Pickup & Delivery':(isCarpet?'Carpet Cleaning':'Upholstery Cleaning');var f=mk('div','bk-form');f.id='bkf-'+mid;f.innerHTML='<h3>&#x1F4C5; Booking Request &#x2014; '+lbl+'</h3><div class="bk-note">Please fill in your details below. Adolfo will confirm your appointment time.</div><div class="bk-row-2"><div class="bk-row"><label class="bk-label">First &amp; Last Name *</label><input class="bk-input" id="bk-name-'+mid+'" placeholder="Jane Smith"/></div><div class="bk-row"><label class="bk-label">Phone Number *</label><input class="bk-input" id="bk-phone-'+mid+'" placeholder="(847) 555-1234" type="tel"/></div></div><div class="bk-row"><label class="bk-label">Email Address *</label><input class="bk-input" id="bk-email-'+mid+'" placeholder="you@email.com" type="email"/></div><div class="bk-row"><label class="bk-label">Full Address (include city) *</label><input class="bk-input" id="bk-addr-'+mid+'" placeholder="123 Main St, Wilmette, IL 60091"/></div>'+(isRug?'<div class="bk-row"><label class="bk-label">Rug Size(s) *</label><input class="bk-input" id="bk-detail-'+mid+'" placeholder="e.g. 8x10 wool, 5x7 Persian"/></div>':(isCarpet?'<div class="bk-row-2"><div class="bk-row"><label class="bk-label">Number of Rooms *</label><input class="bk-input" id="bk-detail-'+mid+'" placeholder="e.g. 3 bedrooms, living room"/></div><div class="bk-row"><label class="bk-label">Stairs (if any)</label><input class="bk-input" id="bk-stairs-'+mid+'" placeholder="e.g. 14 stairs"/></div></div>':'<div class="bk-row"><label class="bk-label">Items to Clean *</label><input class="bk-input" id="bk-detail-'+mid+'" placeholder="e.g. sofa, 2 chairs, ottoman"/></div>'))+'<div class="bk-row-2"><div class="bk-row"><label class="bk-label">Preferred Date *</label><input class="bk-input" id="bk-date-'+mid+'" type="date"/></div><div class="bk-row"><label class="bk-label">Time Preference</label><select class="bk-select" id="bk-time-'+mid+'"><option value="Morning">Morning (first available)</option><option value="Afternoon">Afternoon</option><option value="No preference">No preference</option></select></div></div><div class="bk-row"><label class="bk-check"><input type="checkbox" id="bk-self-'+mid+'" onchange="toggleContact(''+mid+'',this.checked)" checked/> I will be there to let your crew in</label></div><div id="bk-contact-box-'+mid+'" class="contact-toggle"><div class="bk-note" style="margin-bottom:8px">Please provide the contact who will let our crew in:</div><div class="bk-row-2"><div class="bk-row"><label class="bk-label">Contact Name *</label><input class="bk-input" id="bk-cname-'+mid+'" placeholder="Name of person on-site"/></div><div class="bk-row"><label class="bk-label">Contact Phone *</label><input class="bk-input" id="bk-cphone-'+mid+'" placeholder="Their phone number"/></div></div></div><div class="bk-row"><label class="bk-label">Pets in the home?</label><select class="bk-select" id="bk-pets-'+mid+'"><option value="None">No pets</option><option value="Dogs">Dog(s)</option><option value="Cats">Cat(s)</option><option value="Dogs and cats">Dogs and cats</option><option value="Other pets">Other pets</option></select></div><div class="bk-row"><label class="bk-label">Additional Notes</label><textarea class="bk-input" id="bk-notes-'+mid+'" rows="2" placeholder="Anything else we should know..." style="resize:vertical"></textarea></div><button class="bk-submit" onclick="submitBooking(''+mid+'',''+svc+'',''+lbl+'')">Send Booking Request &#x2713;</button><button class="bk-cancel" onclick="cancelBooking(''+mid+'')">Never mind, I'll call instead</button>';return f;}

function submitBooking(mid,svc,lbl){var name=document.getElementById('bk-name-'+mid).value.trim(),phone=document.getElementById('bk-phone-'+mid).value.trim(),email=document.getElementById('bk-email-'+mid).value.trim(),addr=document.getElementById('bk-addr-'+mid).value.trim(),detail=document.getElementById('bk-detail-'+mid).value.trim(),stairsEl=document.getElementById('bk-stairs-'+mid),stairs=stairsEl?stairsEl.value.trim():'',date=document.getElementById('bk-date-'+mid).value,time=document.getElementById('bk-time-'+mid).value,selfP=document.getElementById('bk-self-'+mid).checked,pets=document.getElementById('bk-pets-'+mid).value,notes=document.getElementById('bk-notes-'+mid).value.trim(),cnameEl=document.getElementById('bk-cname-'+mid),cphoneEl=document.getElementById('bk-cphone-'+mid),cname=selfP?'':(cnameEl?cnameEl.value.trim():''),cphone=selfP?'':(cphoneEl?cphoneEl.value.trim():'');if(!name||!phone||!email||!addr||!detail||!date){alert('Please fill in all required fields (marked with *).');return;}if(!selfP&&(!cname||!cphone)){alert('Please provide the on-site contact name and phone, or check that you will be there yourself.');return;}var isChicago=/\bchicago\b/i.test(addr);var truckInfo=svc==='CARPET'?'Truck 1 (primary) or Truck 2 — Hard Surface Calendar':svc==='UPHOLSTERY'?'Truck 1 preferred — Hard Surface Calendar':'Rug Pickup & Delivery Calendar — Tues & Thurs only';var dateDisp=date?new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}):'Not specified';var eb='=== NEW BOOKING REQUEST - KASHIAN BROS KAY ===\n\nSERVICE: '+lbl+'\nCALENDAR/TRUCK: '+truckInfo+'\n'+(isChicago?'*** CHICAGO ADDRESS - Adolfo must book manually ***\n':'')+'\n--- CUSTOMER ---\nName: '+name+'\nPhone: '+phone+'\nEmail: '+email+'\nAddress: '+addr+'\n\n--- JOB DETAILS ---\n'+(svc==='CARPET'?'Rooms: '+detail+'\n'+(stairs?'Stairs: '+stairs+'\n':''):svc==='UPHOLSTERY'?'Items: '+detail+'\n':'Rugs: '+detail+'\n')+'Pets: '+pets+'\n'+(notes?'Notes: '+notes+'\n':'')+'\n--- SCHEDULING ---\nPreferred Date: '+dateDisp+'\nTime Preference: '+time+'\n\n--- ON-SITE ---\n'+(selfP?'Customer will be present\n':'On-site contact: '+cname+'\nContact phone: '+cphone+'\n')+'\nSubmitted: '+new Date().toLocaleString()+' via Kay AI';fetch('/.netlify/functions/booking',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,phone,email,addr,svc,lbl,detail,stairs,date:dateDisp,time,selfP,cname,cphone,pets,notes,isChicago,truckInfo,emailBody:eb})}).catch(function(){console.log('Booking notification failed');});var timing=getConfirmTiming();var f=document.getElementById('bkf-'+mid);f.className='bk-success';f.innerHTML='<h3>&#x2705; Booking Request Sent!</h3><p style="margin-top:8px"><strong>Thank you, '+name.split(' ')[0]+'!</strong></p><p style="margin-top:6px">Your booking request for <strong>'+lbl+'</strong> on <strong>'+dateDisp+'</strong> has been sent to our team.</p><p style="margin-top:8px;background:#dcfce7;border-radius:6px;padding:8px"><strong>'+timing+'</strong></p><p style="margin-top:8px">A confirmation will be sent to <strong>'+email+'</strong>. Questions? Call <strong>(847) 251-1200</strong>.</p>'+(isChicago?'<p style="margin-top:8px;background:#fef9c3;border-radius:6px;padding:8px">&#x1F4CD; Chicago bookings are handled personally by our cleaning manager!</p>':'');hist.push({role:'user',content:'[BOOKING_SUBMITTED] '+name+' booked '+lbl+' for '+dateDisp+' at '+addr});hist.push({role:'assistant',content:'Booking request sent! '+timing});}
function addMsg(role,content,id){var msgs=document.getElementById('msgs'),isBot=role==='assistant';var fm=content.match(/\[SHOW_BOOKING_FORM:(CARPET|UPHOLSTERY|RUG_PICKUP)\]/);var cc=content.replace(/\[SHOW_BOOKING_FORM:(CARPET|UPHOLSTERY|RUG_PICKUP)\]/g,'').trim();var row=mk('div','row '+(isBot?'b':'u'));row.id='r'+id;var ic=mk('div','ic '+(isBot?'b':'u'));ic.innerHTML=isBot?'&#x1F9F9;':'&#x1F464;';var wrap=mk('div');wrap.style.maxWidth='100%';var bub=mk('div','bub '+(isBot?'b':'u'));bub.innerHTML=isBot?nl2html(cc):'<p>'+content+'</p>';wrap.appendChild(bub);if(fm&&isBot){wrap.appendChild(buildBookingForm(fm[1],id));}if(isBot&&id>0){var fbr=mk('div','fbr');var bg=mk('button','fb good');bg.textContent='Good';bg.onclick=function(){thumb(id,'good',content);};fbr.appendChild(bg);var bb=mk('button','fb bad');bb.textContent='Fix';bb.onclick=function(){thumb(id,'bad',content);};fbr.appendChild(bb);var bn=mk('button','fb note');bn.id='fbn'+id;bn.textContent='Add note';bn.onclick=function(){toggleNote(id,content);};fbr.appendChild(bn);wrap.appendChild(fbr);var nb=mk('div','nb');nb.id='nb'+id;nb.style.display='none';var nl=mk('div');nl.id='nl'+id;nl.style.cssText='font-size:12px;color:#92400e;margin-bottom:6px;font-weight:500';nl.textContent='Add a note:';var nt=mk('textarea');nt.id='nt'+id;nt.rows=3;nt.placeholder='Type correction or note...';nt.onkeydown=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitNote(id,content);}};var na=mk('div','na');var ns=mk('button','ns');ns.textContent='Submit';ns.onclick=function(){submitNote(id,content);};var nc=mk('button','nc');nc.textContent='Cancel';nc.onclick=function(){document.getElementById('nb'+id).style.display='none';};var nh=mk('span');nh.style.cssText='font-size:11px;color:#94a3b8';nh.textContent='or press Enter';na.appendChild(ns);na.appendChild(nc);na.appendChild(nh);nb.appendChild(nl);nb.appendChild(nt);nb.appendChild(na);wrap.appendChild(nb);}row.appendChild(ic);row.appendChild(wrap);msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;cnt++;document.getElementById('mc').textContent=cnt+' messages';}
function addTyping(){var msgs=document.getElementById('msgs');var d=mk('div','row b');d.id='typing';var ic=mk('div','ic b');ic.innerHTML='&#x1F9F9;';var td=mk('div','td');[0,.2,.4].forEach(function(s){var dot=mk('div');dot.style.animationDelay=s+'s';td.appendChild(dot);});d.appendChild(ic);d.appendChild(td);msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}
function thumb(id,type,content){var btn=document.querySelector('#r'+id+' .fb.'+type);if(!btn)return;var on=btn.classList.contains('on');document.querySelectorAll('#r'+id+' .fb.good, #r'+id+' .fb.bad').forEach(function(b){b.classList.remove('on');});if(!on){btn.classList.add('on');if(type==='bad'){document.getElementById('nb'+id).style.display='block';setTimeout(function(){document.getElementById('nt'+id).focus();},50);}addFb({type:type,msgId:id,q:getLastQ(),a:content.substring(0,120),note:'']);}}
function toggleNote(id,content){var box=document.getElementById('nb'+id);box.style.display=box.style.display!=='none'?'none':'block';if(box.style.display!=='none')setTimeout(function(){document.getElementById('nt'+id).focus();},50);}
function submitNote(id,content){var txt=document.getElementById('nt'+id).value.trim();if(!txt)return;addFb({type:'note',msgId:id,q:getLastQ(),a:content.substring(0,120),note:txt});document.getElementById('nb'+id).style.display='none';document.getElementById('nt'+id).value='';var btn=document.getElementById('fbn'+id);btn.textContent='Note added';btn.classList.add('on');}
function getLastQ(){var f=hist.slice().reverse().find(function(m){return m.role==='user';});return f?f.content.substring(0,80):'';}
function addFb(entry){entry.tester=document.getElementById('tn').value||'Anonymous';entry.time=new Date().toLocaleTimeString();fbLog=fbLog.filter(function(f){return!(f.msgId===entry.msgId&&f.type===entry.type);});fbLog.push(entry);renderFb();}
function renderFb(){var list=document.getElementById('fl');document.getElementById('fc').textContent=fbLog.length;if(!fbLog.length){list.innerHTML='No feedback yet.<br><br>Good = correct<br>Fix = wrong<br>Note = add comment';return;}var colors={good:'#16a34a',bad:'#dc2626',note:'#ca8a04'};var labels={good:'Correct',bad:'Needs fix',note:'Note'};list.innerHTML='';fbLog.slice().reverse().forEach(function(f){var d=mk('div');d.style.cssText='background:#fff;border:1px solid #e2eef5;border-left:3px solid '+colors[f.type]+';border-radius:8px;padding:9px;font-size:11.5px;color:#334155';d.innerHTML='<div style="font-size:10px;color:#94a3b8;margin-bottom:3px;display:flex;justify-content:space-between"><span style="font-weight:600;color:'+colors[f.type]+'">'+labels[f.type]+'</span><span>'+f.tester+'</span></div>'+(f.q?'<div style="color:#64748b;font-style:italic;font-size:11px;margin-bottom:3px">"'+f.q+'"</div>':'')+'<div style="color:#1e293b">'+(f.note||f.a+'...')+'</div>';list.appendChild(d);});}
function exportFb(){if(!fbLog.length){alert('No feedback yet.');return;}var t=document.getElementById('tn').value||'Anonymous';var txt='KASHIAN BROS KAY FEEDBACK\nExported: '+new Date().toLocaleString()+'\nTester: '+t+'\nTotal: '+fbLog.length+'\n\n';fbLog.forEach(function(f,i){var lbl={good:'CORRECT',bad:'NEEDS FIX',note:'NOTE'}[f.type];txt+='['+(i+1)+'] '+lbl+' - '+f.tester+' at '+f.time+'\n';if(f.q)txt+='Asked: "'+f.q+'"\n';txt+=f.note?'Correction: '+f.note+'\n':'Response: '+f.a+'...\n';txt+='\n';});var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));a.download='KashianBros_Kay_Feedback_'+new Date().toISOString().slice(0,10)+'.txt';a.click();}
function send(text){if(!text||!text.trim())return;document.getElementById('qw').style.display='none';document.getElementById('inp').value='';document.getElementById('sb').disabled=true;var id=cnt;addMsg('user',text,id);hist.push({role:'user',content:text});addTyping();fetch('/.netlify/functions/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,system:SP,messages:hist})}).then(function(r){return r.json();}).then(function(data){var reply=data.content&&data.content[0]?data.content[0].text:'I had trouble with that. Please call (847) 251-1200!';var t=document.getElementById('typing');if(t)t.remove();hist.push({role:'assistant',content:reply});addMsg('assistant',reply,cnt);}).catch(function(){var t=document.getElementById('typing');if(t)t.remove();addMsg('assistant','I am having trouble connecting. Please call (847) 251-1200 or email info@kashianbros.com!',cnt);}).finally(function(){document.getElementById('sb').disabled=false;});}
addMsg('assistant','Hi there! I am Kay from Kashian Bros - we have been caring for North Shore homes since 1910. Whether you need a rug cleaned, carpet or upholstery cleaning, wood floor refinishing, a rug pad, or have a stain emergency - I am here to help. What can I do for you today?',0);
